name: taktflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taktflow
      POSTGRES_PASSWORD: taktflow
      POSTGRES_DB: taktflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taktflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/taktflow-api/Dockerfile
      target: development
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://taktflow:taktflow@postgres:5432/taktflow
      JWT_ACCESS_SECRET: local-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: local-refresh-secret-min-32-characters-long
      API_KEY_SIGNING_SECRET: local-signing-secret-min-32-characters-long
      DASHBOARD_URL: http://localhost:5173
      LOG_LEVEL: debug
      WORKER_BATCH_SIZE: "50"
      WORKER_POLL_INTERVAL_MS: "100"
      WORKER_DELIVERY_TIMEOUT_MS: "30000"
      RESEND_API_KEY: re_local_placeholder
    volumes:
      - ./src:/app/src
      - ./packages:/app/packages
      - /app/node_modules
      - /app/src/taktflow-api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm --filter @taktflow/api dev

  worker:
    build:
      context: .
      dockerfile: src/taktflow-worker/Dockerfile
      target: development
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://taktflow:taktflow@postgres:5432/taktflow
      LOG_LEVEL: debug
      WORKER_BATCH_SIZE: "50"
      WORKER_POLL_INTERVAL_MS: "100"
      WORKER_DELIVERY_TIMEOUT_MS: "30000"
      RESEND_API_KEY: re_local_placeholder
    volumes:
      - ./src:/app/src
      - ./packages:/app/packages
      - /app/node_modules
      - /app/src/taktflow-worker/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm --filter @taktflow/worker dev

volumes:
  postgres_data:
